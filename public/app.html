<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiel — Meu Diário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:wght@400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;0,900&family=Archivo:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
    --preto: #000000;
    --preto-card: #0d0d0d;
    --preto-card-2: #141414;
    --branco: #f5f5f5;
    --branco-suave: #e6e4de;
    --cinza-claro: #a8a49a;
    --cinza-medio: #6c6a62;
    --cinza-linha: #2a2824;
    --cinza-divisa: #1e1c18;
    --ouro: #9c8a52;
    --ouro-claro: #b8a66a;
    --ouro-suave: rgba(156, 138, 82, 0.18);
    --vitoria: #a89050;
    --empate: #5c5a54;
    --derrota: #5c1f2a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: var(--preto);
    color: var(--branco);
    font-family: 'Archivo', sans-serif;
    min-height: 100vh;
    position: relative;
}

body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
        radial-gradient(circle at 1px 1px, rgba(255,255,255,0.025) 1px, transparent 1.5px),
        radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.85) 100%);
    background-size: 3px 3px, 100% 100%;
    pointer-events: none;
    z-index: 0;
}

header {
    position: relative;
    z-index: 1;
    padding: 1.5rem 2rem;
    border-bottom: 1px solid var(--cinza-linha);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
}

.brand {
    font-family: 'Anton', sans-serif;
    font-size: 1.75rem;
    letter-spacing: 0.12em;
    color: var(--ouro);
    text-transform: uppercase;
}

.user-info {
    display: flex;
    align-items: center;
    gap: 1rem;
    font-size: 0.85rem;
    color: var(--cinza-claro);
}

.user-info strong { color: var(--branco); }

.btn-logout {
    background: transparent;
    border: 1px solid var(--cinza-linha);
    color: var(--cinza-claro);
    padding: 0.45rem 0.9rem;
    font-family: inherit;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 120ms;
}
.btn-logout:hover { border-color: var(--ouro); color: var(--ouro); }

main {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
}

.hero {
    text-align: center;
    padding: 2rem 1rem 2.5rem;
}
.hero h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(1.8rem, 4vw, 2.75rem);
    line-height: 1.1;
    margin-bottom: 0.5rem;
}
.hero p {
    color: var(--cinza-claro);
    font-size: 0.95rem;
}

/* ================= KPIs ================= */
.kpis {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1px;
    background: var(--cinza-linha);
    border: 1px solid var(--cinza-linha);
    margin-bottom: 2rem;
}
.kpi {
    background: var(--preto-card);
    padding: 1.25rem 1rem;
    text-align: center;
}
.kpi-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--cinza-medio);
    margin-bottom: 0.4rem;
}
.kpi-value {
    font-family: 'Anton', sans-serif;
    font-size: 2rem;
    color: var(--ouro);
    line-height: 1;
}
.kpi-value.v { color: var(--vitoria); }
.kpi-value.e { color: #8a8880; }
.kpi-value.d { color: #a95a68; }

/* ================= Tabs ================= */
.tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--cinza-linha);
    margin-bottom: 1.5rem;
}
.tab {
    background: transparent;
    border: none;
    color: var(--cinza-claro);
    padding: 0.85rem 1.3rem;
    font-family: inherit;
    font-size: 0.75rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 120ms;
}
.tab:hover { color: var(--branco); }
.tab.active {
    color: var(--ouro);
    border-bottom-color: var(--ouro);
}

.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ================= Filter bar ================= */
.filter-bar {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
    align-items: center;
}
.filter-bar input,
.filter-bar select {
    background: var(--preto-card-2);
    border: 1px solid var(--cinza-linha);
    color: var(--branco);
    padding: 0.55rem 0.75rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    outline: none;
}
.filter-bar input:focus,
.filter-bar select:focus { border-color: var(--ouro); }

.checkbox-wrap {
    display: flex;
    align-items: center;
    gap: 0.45rem;
    font-size: 0.8rem;
    color: var(--cinza-claro);
    cursor: pointer;
}
.checkbox-wrap input { width: auto; }

/* ================= Game list ================= */
.games-grid {
    display: grid;
    gap: 1px;
    background: var(--cinza-linha);
    border: 1px solid var(--cinza-linha);
}

.game-row {
    background: var(--preto-card);
    padding: 1rem 1.25rem;
    display: grid;
    grid-template-columns: 90px 1fr 90px auto;
    gap: 1rem;
    align-items: center;
    cursor: pointer;
    transition: background 120ms;
}
.game-row:hover { background: var(--preto-card-2); }
.game-row.attended { border-left: 3px solid var(--ouro); padding-left: calc(1.25rem - 3px); }

.game-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--cinza-claro);
}
.game-date .weekday {
    display: block;
    font-size: 0.65rem;
    color: var(--cinza-medio);
    text-transform: uppercase;
    letter-spacing: 0.1em;
}

.game-teams {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--branco);
}
.game-teams .comp {
    display: block;
    font-family: 'Archivo', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--cinza-medio);
    font-weight: 500;
    margin-top: 0.2rem;
}

.game-score {
    font-family: 'Anton', sans-serif;
    font-size: 1.4rem;
    color: var(--branco);
    text-align: center;
}
.game-score.v { color: var(--vitoria); }
.game-score.d { color: #a95a68; }

.game-badge {
    display: inline-block;
    padding: 0.3rem 0.7rem;
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 700;
}
.game-badge.presente { background: var(--ouro-suave); color: var(--ouro-claro); }
.game-badge.marcar { border: 1px solid var(--cinza-linha); color: var(--cinza-medio); }

/* ================= Modal ================= */
.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 1rem;
}
.modal-overlay.show { display: flex; }

.modal {
    background: var(--preto-card);
    border: 1px solid var(--cinza-linha);
    max-width: 480px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 2rem 1.75rem;
}
.modal h2 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1.25rem;
    margin-bottom: 0.3rem;
}
.modal .meta {
    font-size: 0.8rem;
    color: var(--cinza-claro);
    margin-bottom: 1.5rem;
    font-family: 'JetBrains Mono', monospace;
}

.modal label {
    display: block;
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--cinza-claro);
    margin-top: 1rem;
    margin-bottom: 0.35rem;
}

.modal input,
.modal select,
.modal textarea {
    width: 100%;
    background: var(--preto-card-2);
    border: 1px solid var(--cinza-linha);
    color: var(--branco);
    padding: 0.65rem 0.8rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    outline: none;
    resize: vertical;
}
.modal input:focus,
.modal select:focus,
.modal textarea:focus { border-color: var(--ouro); }

.modal-actions {
    display: flex;
    gap: 0.75rem;
    margin-top: 1.75rem;
}
.modal-actions button {
    flex: 1;
    padding: 0.75rem;
    font-family: inherit;
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: all 120ms;
}
.btn-primary { background: var(--ouro); color: var(--preto); }
.btn-primary:hover { background: var(--ouro-claro); }
.btn-secondary {
    background: transparent;
    border: 1px solid var(--cinza-linha) !important;
    color: var(--cinza-claro);
}
.btn-secondary:hover { border-color: var(--ouro) !important; color: var(--ouro); }
.btn-danger {
    background: transparent;
    border: 1px solid var(--derrota) !important;
    color: #a95a68;
}
.btn-danger:hover { background: rgba(92,31,42,0.3); }

.loading {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--cinza-claro);
    font-size: 0.85rem;
}

.empty {
    text-align: center;
    padding: 2.5rem 1rem;
    color: var(--cinza-medio);
    font-size: 0.9rem;
}

@media (max-width: 700px) {
    .game-row {
        grid-template-columns: 70px 1fr auto;
        gap: 0.75rem;
    }
    .game-score { grid-column: 1 / -1; text-align: left; font-size: 1.1rem; }
}
</style>
</head>
<body>
    <header>
        <div class="brand">Fiel</div>
        <div class="user-info">
            <span>Olá, <strong id="userName">—</strong></span>
            <a href="/dashboard" style="color:var(--cinza-claro);font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;text-decoration:none;">Museu legado</a>
            <button class="btn-logout" id="btnLogout">Sair</button>
        </div>
    </header>

    <main>
        <section class="hero">
            <h1 id="heroTitle">Seu diário começa aqui</h1>
            <p id="heroSubtitle">Marque os jogos que você foi, registre valor pago e setor.</p>
        </section>

        <section class="kpis" id="kpis" style="display:none;">
            <div class="kpi"><div class="kpi-label">Jogos</div><div class="kpi-value" id="kpiJogos">0</div></div>
            <div class="kpi"><div class="kpi-label">Vitórias</div><div class="kpi-value v" id="kpiV">0</div></div>
            <div class="kpi"><div class="kpi-label">Empates</div><div class="kpi-value e" id="kpiE">0</div></div>
            <div class="kpi"><div class="kpi-label">Derrotas</div><div class="kpi-value d" id="kpiD">0</div></div>
            <div class="kpi"><div class="kpi-label">Aprov.</div><div class="kpi-value" id="kpiApr">—</div></div>
            <div class="kpi"><div class="kpi-label">Gasto total</div><div class="kpi-value" id="kpiGasto">R$ 0</div></div>
        </section>

        <div class="tabs">
            <button class="tab active" data-tab="catalog">Catálogo de jogos</button>
            <button class="tab" data-tab="mine">Meus ingressos</button>
        </div>

        <div class="tab-panel active" id="tabCatalog">
            <div class="filter-bar">
                <input type="search" id="search" placeholder="Buscar rival, campeonato, estádio...">
                <select id="filterYear"><option value="">Todos os anos</option></select>
                <label class="checkbox-wrap"><input type="checkbox" id="onlyMine"> Só os que fui</label>
            </div>
            <div id="catalogList" class="games-grid"><div class="loading">Carregando jogos...</div></div>
        </div>

        <div class="tab-panel" id="tabMine">
            <div id="mineList" class="games-grid"><div class="loading">Carregando seus ingressos...</div></div>
        </div>
    </main>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h2 id="modalTitle">—</h2>
            <div class="meta" id="modalMeta">—</div>

            <label>Status</label>
            <select id="fStatus">
                <option value="PRESENTE">Fui (presente)</option>
                <option value="AUSENTE">Não fui</option>
            </select>

            <label>Setor / Arquibancada</label>
            <input type="text" id="fSetor" placeholder="Ex: Gaviões, Norte, Oeste...">

            <label>Assento (opcional)</label>
            <input type="text" id="fAssento" placeholder="Ex: 12A">

            <label>Valor pago (R$)</label>
            <input type="number" id="fValor" step="0.01" min="0" placeholder="0.00">

            <label>Observações</label>
            <textarea id="fObs" rows="3" placeholder="Ex: primeiro jogo com meu filho"></textarea>

            <div class="modal-actions">
                <button class="btn-secondary" id="btnCancel">Cancelar</button>
                <button class="btn-danger" id="btnDelete" style="display:none;">Remover</button>
                <button class="btn-primary" id="btnSave">Salvar</button>
            </div>
        </div>
    </div>

<script>
    const token = localStorage.getItem('fiel_token');
    if (!token) window.location.replace('/login');

    const user = JSON.parse(localStorage.getItem('fiel_user') || '{}');
    document.getElementById('userName').textContent = user.display_name || user.email?.split('@')[0] || 'torcedor';

    document.getElementById('btnLogout').addEventListener('click', () => {
        localStorage.removeItem('fiel_token');
        localStorage.removeItem('fiel_user');
        window.location.replace('/login');
    });

    // ========================================================
    // API helpers
    // ========================================================
    async function api(path, opts = {}) {
        const res = await fetch(path, {
            ...opts,
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`,
                ...(opts.headers || {}),
            },
        });
        if (res.status === 401) {
            localStorage.removeItem('fiel_token');
            window.location.replace('/login');
            throw new Error('unauthorized');
        }
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || `HTTP ${res.status}`);
        }
        return res.json();
    }

    // ========================================================
    // State
    // ========================================================
    let allGames = [];
    let snapshot = null;
    let editingGame = null;

    // ========================================================
    // Load
    // ========================================================
    async function loadAll() {
        try {
            const [gamesRes, snap] = await Promise.all([
                api('/games?limit=1000'),
                api('/me/snapshot'),
            ]);
            allGames = gamesRes.games;
            snapshot = snap;
            renderKpis();
            renderCatalog();
            renderMine();
            populateYears();
        } catch (err) {
            console.error(err);
            document.getElementById('catalogList').innerHTML =
                `<div class="empty">Erro ao carregar: ${err.message}</div>`;
        }
    }

    function renderKpis() {
        const g = snapshot.geral || {};
        if (!g.jogos) return;
        document.getElementById('kpis').style.display = '';
        document.getElementById('kpiJogos').textContent = g.jogos;
        document.getElementById('kpiV').textContent = g.vitorias || 0;
        document.getElementById('kpiE').textContent = g.empates || 0;
        document.getElementById('kpiD').textContent = g.derrotas || 0;
        document.getElementById('kpiApr').textContent = g.aproveitamento_pct != null ? `${g.aproveitamento_pct}%` : '—';
        const gasto = snapshot.gastos?.total?.gasto_total || 0;
        document.getElementById('kpiGasto').textContent = `R$ ${Number(gasto).toLocaleString('pt-BR', {minimumFractionDigits:0, maximumFractionDigits:0})}`;
        if (g.jogos > 0) {
            document.getElementById('heroTitle').textContent = `${g.jogos} jogos presenciais`;
            document.getElementById('heroSubtitle').textContent = `${g.vitorias}V · ${g.empates}E · ${g.derrotas}D · ${g.aproveitamento_pct}% de aproveitamento`;
        }
    }

    function populateYears() {
        const years = [...new Set(allGames.map(g => new Date(g.data).getFullYear()))].sort((a, b) => b - a);
        const sel = document.getElementById('filterYear');
        for (const y of years) {
            const opt = document.createElement('option');
            opt.value = y; opt.textContent = y;
            sel.appendChild(opt);
        }
    }

    function formatDate(iso) {
        const d = new Date(iso);
        return {
            main: d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit' }),
            weekday: d.toLocaleDateString('pt-BR', { weekday: 'short' }).replace('.', ''),
        };
    }

    function escapeHtml(s) {
        return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function renderGameRow(game) {
        const d = formatDate(game.data);
        const score = game.gols_casa != null
            ? `${game.gols_casa}<span style="color:var(--cinza-medio);"> x </span>${game.gols_visitante}`
            : '—';
        const scoreClass = game.resultado === 'V' ? 'v' : game.resultado === 'D' ? 'd' : '';
        const isMine = !!game.attendance_id && game.status_presenca === 'PRESENTE';
        const badge = isMine
            ? '<span class="game-badge presente">Fui</span>'
            : '<span class="game-badge marcar">+ Marcar</span>';

        return `
            <div class="game-row ${isMine ? 'attended' : ''}" data-id="${game.id}">
                <div class="game-date">
                    <span class="weekday">${escapeHtml(d.weekday)}</span>
                    ${escapeHtml(d.main)}
                </div>
                <div class="game-teams">
                    ${escapeHtml(game.time_casa)} × ${escapeHtml(game.time_visitante)}
                    <span class="comp">${escapeHtml(game.campeonato || '—')}${game.estadio ? ' · ' + escapeHtml(game.estadio) : ''}</span>
                </div>
                <div class="game-score ${scoreClass}">${score}</div>
                <div>${badge}</div>
            </div>
        `;
    }

    function renderCatalog() {
        const search = document.getElementById('search').value.toLowerCase().trim();
        const year = document.getElementById('filterYear').value;
        const onlyMine = document.getElementById('onlyMine').checked;

        const filtered = allGames.filter(g => {
            if (year && new Date(g.data).getFullYear() != year) return false;
            if (onlyMine && !(g.attendance_id && g.status_presenca === 'PRESENTE')) return false;
            if (search) {
                const hay = `${g.time_casa} ${g.time_visitante} ${g.campeonato || ''} ${g.estadio || ''}`.toLowerCase();
                if (!hay.includes(search)) return false;
            }
            return true;
        });

        const container = document.getElementById('catalogList');
        if (!filtered.length) {
            container.innerHTML = '<div class="empty">Nenhum jogo encontrado com esses filtros.</div>';
            return;
        }
        container.innerHTML = filtered.map(renderGameRow).join('');
        container.querySelectorAll('.game-row').forEach(row => {
            row.addEventListener('click', () => openModal(parseInt(row.dataset.id)));
        });
    }

    function renderMine() {
        const mine = allGames.filter(g => g.attendance_id);
        const container = document.getElementById('mineList');
        if (!mine.length) {
            container.innerHTML = '<div class="empty">Você ainda não marcou nenhum ingresso. Vai no catálogo e marque os jogos que você foi!</div>';
            return;
        }
        container.innerHTML = mine.map(renderGameRow).join('');
        container.querySelectorAll('.game-row').forEach(row => {
            row.addEventListener('click', () => openModal(parseInt(row.dataset.id)));
        });
    }

    // ========================================================
    // Modal
    // ========================================================
    function openModal(gameId) {
        const game = allGames.find(g => g.id === gameId);
        if (!game) return;
        editingGame = game;

        document.getElementById('modalTitle').textContent = `${game.time_casa} × ${game.time_visitante}`;
        const d = formatDate(game.data);
        const scoreText = game.gols_casa != null ? ` · ${game.gols_casa} x ${game.gols_visitante}` : '';
        document.getElementById('modalMeta').textContent =
            `${d.weekday} ${d.main} · ${game.campeonato || '—'}${game.estadio ? ' · ' + game.estadio : ''}${scoreText}`;

        document.getElementById('fStatus').value = game.status_presenca || 'PRESENTE';
        document.getElementById('fSetor').value = game.setor || '';
        document.getElementById('fAssento').value = game.assento || '';
        document.getElementById('fValor').value = game.valor_pago ?? '';
        document.getElementById('fObs').value = game.observacoes || '';

        document.getElementById('btnDelete').style.display = game.attendance_id ? '' : 'none';
        document.getElementById('modal').classList.add('show');
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('show');
        editingGame = null;
    }

    document.getElementById('btnCancel').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', (e) => {
        if (e.target.id === 'modal') closeModal();
    });

    document.getElementById('btnSave').addEventListener('click', async () => {
        if (!editingGame) return;
        const btn = document.getElementById('btnSave');
        btn.disabled = true;
        btn.textContent = 'Salvando...';
        try {
            const body = {
                game_id: editingGame.id,
                status: document.getElementById('fStatus').value,
                setor: document.getElementById('fSetor').value.trim() || null,
                assento: document.getElementById('fAssento').value.trim() || null,
                valor_pago: document.getElementById('fValor').value ? parseFloat(document.getElementById('fValor').value) : null,
                observacoes: document.getElementById('fObs').value.trim() || null,
            };
            await api('/attendances', { method: 'POST', body: JSON.stringify(body) });
            closeModal();
            await loadAll();
        } catch (err) {
            alert('Erro: ' + err.message);
        } finally {
            btn.disabled = false;
            btn.textContent = 'Salvar';
        }
    });

    document.getElementById('btnDelete').addEventListener('click', async () => {
        if (!editingGame || !editingGame.attendance_id) return;
        if (!confirm('Remover esse registro?')) return;
        try {
            await api(`/attendances/${editingGame.attendance_id}`, { method: 'DELETE' });
            closeModal();
            await loadAll();
        } catch (err) {
            alert('Erro: ' + err.message);
        }
    });

    // ========================================================
    // Tabs + filters
    // ========================================================
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(tab.dataset.tab === 'catalog' ? 'tabCatalog' : 'tabMine').classList.add('active');
        });
    });

    document.getElementById('search').addEventListener('input', renderCatalog);
    document.getElementById('filterYear').addEventListener('change', renderCatalog);
    document.getElementById('onlyMine').addEventListener('change', renderCatalog);

    loadAll();
</script>
</body>
</html>
