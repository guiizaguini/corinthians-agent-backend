<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar — Arquibancada</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles/auth.css">
</head>
<body>
    <form class="card" id="loginForm" autocomplete="on">
        <div class="logo">Arquibancada</div>
        <div class="tagline">Diário do Torcedor</div>
        <h1>Bem-vindo de <em>volta</em>.</h1>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required>

        <label for="password">Senha</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>

        <div class="error" id="err"></div>

        <button type="submit" id="btn">Entrar</button>

        <div class="link">
            Não tem conta? <a href="/signup">Criar conta</a>
        </div>
    </form>

<script>
    if (localStorage.getItem('fiel_token')) {
        window.location.replace('/app');
    }

    const form = document.getElementById('loginForm');
    const errBox = document.getElementById('err');
    const btn = document.getElementById('btn');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errBox.classList.remove('show');
        btn.disabled = true;
        btn.textContent = 'Entrando...';

        try {
            const res = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: form.email.value.trim(),
                    password: form.password.value,
                }),
            });
            const data = await res.json();
            if (!res.ok) {
                throw new Error(
                    data.error === 'invalid_credentials'
                        ? 'Email ou senha incorretos'
                        : data.error || 'Erro ao entrar'
                );
            }
            localStorage.setItem('fiel_token', data.token);
            localStorage.setItem('fiel_user', JSON.stringify(data.user));
            window.location.replace('/app');
        } catch (err) {
            errBox.textContent = err.message;
            errBox.classList.add('show');
            btn.disabled = false;
            btn.textContent = 'Entrar';
        }
    });
</script>
</body>
</html>
