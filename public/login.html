<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n-title="meta.title">Entrar — Cadeira Numerada</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link rel="stylesheet" href="/styles/auth.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
    .auth-lang-bar { position: absolute; top: 1rem; right: 1rem; z-index: 5; }
    @media (max-width: 600px) { .auth-lang-bar { top: 0.6rem; right: 0.6rem; } }
</style>
</head>
<body>
    <div class="auth-lang-bar" id="authLangBar"></div>
    <form class="card" id="loginForm" autocomplete="on">
        <div class="logo">Cadeira Numerada</div>
        <div class="tagline" data-i18n="auth.tagline">Diário do Torcedor</div>
        <h1>
            <span data-i18n="auth.login.title_pre">Bem-vindo de </span><em data-i18n="auth.login.title_em">volta</em><span data-i18n="auth.login.title_post">.</span>
        </h1>

        <label for="email" data-i18n="auth.login.email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required>

        <label for="password" data-i18n="auth.login.password">Senha</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>

        <div class="error" id="err"></div>

        <button type="submit" id="btn" data-i18n="auth.login.btn">Entrar</button>

        <div class="auth-divider hidden" id="authDivider"><span data-i18n="auth.divider">ou</span></div>
        <div class="google-btn-wrap hidden" id="googleBtnWrap"></div>

        <div class="link">
            <span data-i18n="auth.login.no_account">Não tem conta?</span> <a href="/signup" data-i18n="auth.login.create">Criar conta</a>
        </div>
    </form>

<script src="/i18n.js"></script>
<script>
    if (localStorage.getItem('fiel_token')) {
        const _qs = new URLSearchParams(location.search);
        const _add = _qs.get('add');
        const _album = _qs.get('album');
        if (_add) window.location.replace(`/app?add=${encodeURIComponent(_add)}`);
        else if (_album) window.location.replace(`/app?album=${encodeURIComponent(_album)}`);
        else window.location.replace('/app');
    }

    const t = (k) => window.CN_I18N.t(k);

    document.addEventListener('DOMContentLoaded', () => {
        const bar = document.getElementById('authLangBar');
        if (bar && window.CN_I18N) {
            bar.appendChild(window.CN_I18N.createLangDropdown({ variant: 'paper' }));
        }
        initGoogleSignIn();
    });

    // Google Sign-In: pega o client ID do servidor, renderiza o botão se houver
    async function initGoogleSignIn() {
        let clientId;
        try {
            const r = await fetch('/config/public');
            const c = await r.json();
            clientId = c.google_client_id;
        } catch (_) { return; }
        if (!clientId) return;

        const ready = () => {
            if (!window.google?.accounts?.id) {
                setTimeout(ready, 80);
                return;
            }
            window.google.accounts.id.initialize({
                client_id: clientId,
                callback: handleGoogleCredential,
                ux_mode: 'popup',
                auto_select: false,
            });
            const wrap = document.getElementById('googleBtnWrap');
            window.google.accounts.id.renderButton(wrap, {
                theme: 'outline', size: 'large',
                text: 'continue_with', shape: 'rectangular',
                logo_alignment: 'left', width: wrap.clientWidth || 360,
            });
            document.getElementById('authDivider').classList.remove('hidden');
            wrap.classList.remove('hidden');
        };
        ready();
    }

    async function handleGoogleCredential(resp) {
        const errBox = document.getElementById('err');
        errBox.classList.remove('show');
        try {
            const r = await fetch('/auth/google', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ credential: resp.credential }),
            });
            const data = await r.json();
            if (!r.ok) {
                throw new Error(
                    data.error === 'invalid_google_token'
                        ? t('auth.google.err_invalid')
                        : data.error === 'google_email_not_verified'
                            ? t('auth.google.err_email')
                            : data.error || t('auth.google.err_invalid')
                );
            }
            localStorage.setItem('fiel_token', data.token);
            localStorage.setItem('fiel_user', JSON.stringify(data.user));
            // Se for primeira vez logando via Google → tour de boas-vindas no /app
            if (data.is_new) sessionStorage.setItem('cn_show_welcome', '1');
            window.location.replace(buildAppRedirect());
        } catch (e) {
            errBox.textContent = e.message;
            errBox.classList.add('show');
        }
    }

    // Preserva query params (?add= ou ?album=) ao redirecionar pra /app
    function buildAppRedirect() {
        const qs = new URLSearchParams(location.search);
        const add = qs.get('add');
        const album = qs.get('album');
        if (add) return `/app?add=${encodeURIComponent(add)}`;
        if (album) return `/app?album=${encodeURIComponent(album)}`;
        return '/app';
    }

    const form = document.getElementById('loginForm');
    const errBox = document.getElementById('err');
    const btn = document.getElementById('btn');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errBox.classList.remove('show');
        btn.disabled = true;
        btn.textContent = t('auth.login.btn_loading');

        try {
            const res = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: form.email.value.trim(),
                    password: form.password.value,
                }),
            });
            const data = await res.json();
            if (!res.ok) {
                throw new Error(
                    data.error === 'invalid_credentials'
                        ? t('auth.login.err_invalid')
                        : data.error || t('auth.login.err_generic')
                );
            }
            localStorage.setItem('fiel_token', data.token);
            localStorage.setItem('fiel_user', JSON.stringify(data.user));
            window.location.replace(buildAppRedirect());
        } catch (err) {
            errBox.textContent = err.message;
            errBox.classList.add('show');
            btn.disabled = false;
            btn.textContent = t('auth.login.btn');
        }
    });
</script>
</body>
</html>
