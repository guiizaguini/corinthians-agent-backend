<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar conta — Arquibancada</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles/auth.css">
</head>
<body>
    <form class="card" id="signupForm" autocomplete="on">
        <div class="logo">Arquibancada</div>
        <div class="tagline">Diário do Torcedor</div>
        <h1>Abrir o <em>diário</em>.</h1>

        <label for="display_name">Como te chamamos?</label>
        <input id="display_name" name="display_name" type="text" maxlength="80" autocomplete="name">

        <label for="username">Username <span style="color:var(--vinho);">*</span></label>
        <input id="username" name="username" type="text" minlength="3" maxlength="30"
               pattern="[a-zA-Z0-9_.]{3,30}"
               autocomplete="username"
               autocapitalize="none"
               spellcheck="false"
               placeholder="ex: guizaguini ou gui_zaguini"
               required>
        <div class="hint">3 a 30 caracteres · letras, números, ponto (.) ou underline (_) — sem espaços nem acentos</div>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required>

        <label for="password">Senha <span style="color:var(--ink-mute);font-weight:400;">(mínimo 8 caracteres)</span></label>
        <input id="password" name="password" type="password" minlength="8" autocomplete="new-password" required>

        <label for="password_confirm">Confirme a senha <span style="color:var(--vinho);">*</span></label>
        <input id="password_confirm" name="password_confirm" type="password" minlength="8" autocomplete="new-password" required>

        <label for="club">Pra qual time você torce?</label>
        <select id="club" name="club">
            <option value="">— Prefiro não escolher agora —</option>
        </select>
        <div class="hint">Dá pra trocar depois. Seu time define o tema visual e o catálogo de jogos.</div>

        <div class="error" id="err"></div>

        <button type="submit" id="btn">Criar conta</button>

        <div class="link">
            Já tem conta? <a href="/login">Entrar</a>
        </div>
    </form>

<script>
    if (localStorage.getItem('fiel_token')) {
        window.location.replace('/app');
    }

    const form = document.getElementById('signupForm');
    const errBox = document.getElementById('err');
    const btn = document.getElementById('btn');
    const clubSelect = document.getElementById('club');

    // Carrega a lista de clubes
    (async () => {
        try {
            const res = await fetch('/clubs');
            const data = await res.json();
            for (const c of data.clubs) {
                const opt = document.createElement('option');
                opt.value = c.slug;
                opt.textContent = c.name;
                opt.dataset.primary = c.primary_color || '';
                clubSelect.appendChild(opt);
            }
        } catch (_) { /* falha silenciosa — dá pra criar conta sem time */ }
    })();

    // Preview ao vivo do tema conforme seleciona o clube
    clubSelect.addEventListener('change', () => {
        const selected = clubSelect.options[clubSelect.selectedIndex];
        const primary = selected.dataset.primary;
        if (primary) {
            document.documentElement.style.setProperty('--accent', primary);
        } else {
            document.documentElement.style.setProperty('--accent', '#6b1f2a');
        }
    });

    // Validação ao vivo do username — destaca erro de formato
    const usernameInput = document.getElementById('username');
    const USERNAME_RE = /^[a-zA-Z0-9_.]{3,30}$/;
    usernameInput.addEventListener('input', () => {
        const v = usernameInput.value.trim();
        if (!v) { usernameInput.setCustomValidity(''); return; }
        if (!USERNAME_RE.test(v)) {
            usernameInput.setCustomValidity('Use só letras, números, ponto (.) ou underline (_), 3 a 30 caracteres');
        } else {
            usernameInput.setCustomValidity('');
        }
    });

    // Validação ao vivo de "confirme a senha"
    const passInput = document.getElementById('password');
    const passConfirm = document.getElementById('password_confirm');
    const checkPassMatch = () => {
        if (passConfirm.value && passInput.value !== passConfirm.value) {
            passConfirm.setCustomValidity('As senhas não conferem');
        } else {
            passConfirm.setCustomValidity('');
        }
    };
    passInput.addEventListener('input', checkPassMatch);
    passConfirm.addEventListener('input', checkPassMatch);

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errBox.classList.remove('show');

        // Validações finais antes do submit
        const username = usernameInput.value.trim();
        const password = passInput.value;
        const passwordConfirm = passConfirm.value;

        if (!USERNAME_RE.test(username)) {
            errBox.textContent = 'Username inválido — use 3 a 30 caracteres (letras, números, . ou _)';
            errBox.classList.add('show');
            return;
        }
        if (password !== passwordConfirm) {
            errBox.textContent = 'As senhas não conferem.';
            errBox.classList.add('show');
            passConfirm.focus();
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Criando...';

        try {
            const res = await fetch('/auth/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    display_name: form.display_name.value.trim() || undefined,
                    email: form.email.value.trim(),
                    password,
                    username: username.toLowerCase(),
                    club_slug: clubSelect.value || null,
                }),
            });
            const data = await res.json();
            if (!res.ok) {
                const msg = {
                    email_already_registered: 'Esse email já tem conta',
                    username_taken: 'Esse @username já está em uso, tenta outro',
                    validation_failed: 'Confere os campos — senha 8+ chars, username 3-30 (letras/números/_/.)',
                    club_not_found: 'Clube inválido',
                }[data.error] || data.error || 'Erro ao criar conta';
                throw new Error(msg);
            }
            localStorage.setItem('fiel_token', data.token);
            localStorage.setItem('fiel_user', JSON.stringify(data.user));
            window.location.replace('/app');
        } catch (err) {
            errBox.textContent = err.message;
            errBox.classList.add('show');
            btn.disabled = false;
            btn.textContent = 'Criar conta';
        }
    });
</script>
</body>
</html>
