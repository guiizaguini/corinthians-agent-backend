<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" fill="none">
  <!-- Fundo transparente, só os números e o troféu estilizado -->
  <!-- "26" grande em preto -->
  <text x="100" y="220" font-family="Arial Black, Oswald, sans-serif" font-weight="900" font-size="280" text-anchor="middle" fill="#0d0d0d" letter-spacing="-10">26</text>
  <!-- Troféu simplificado sobreposto -->
  <g transform="translate(70,20)">
    <!-- Taça -->
    <path d="M30 0 Q 10 5, 10 30 Q 10 55, 30 75 Q 50 55, 50 30 Q 50 5, 30 0 Z" fill="#d4a824"/>
    <!-- Coluna -->
    <rect x="25" y="70" width="10" height="45" fill="#d4a824"/>
    <!-- Base -->
    <rect x="15" y="115" width="30" height="10" fill="#0a6e41"/>
    <rect x="15" y="125" width="30" height="6" fill="#1a7f4f"/>
    <rect x="10" y="131" width="40" height="12" fill="#d4a824"/>
  </g>
  <!-- FIFA footer -->
  <text x="100" y="280" font-family="Arial Black, Oswald, sans-serif" font-weight="900" font-size="32" text-anchor="middle" fill="#0d0d0d" letter-spacing="4">FIFA</text>
</svg>
